name: 캠핑장 데이터 업데이트

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  fetch-camping-data:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v3

      - name: Python 설치
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 캠핑장 데이터 수집
        env:
          API_KEY: ${{ secrets.CAMPING_API_KEY }}
        run: python fetch_data.py

      - name: 데이터 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add camping_data.json
          git diff --staged --quiet || git commit -m "캠핑장 데이터 업데이트 $(date +'%Y-%m-%d')"
          git push
